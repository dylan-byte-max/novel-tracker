name: Deploy on Push

# 只要 main 分支被推送（且改动到这些前端/数据文件），就立刻重新部署到 GitHub Pages
# 不跑爬虫，秒级部署
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/**'
      - 'assets/**'
      - '*.css'
      - '*.js'
      - '!scrapers/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
