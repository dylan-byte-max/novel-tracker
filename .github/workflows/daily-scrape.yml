name: Daily Novel Scrape & Deploy

on:
  schedule:
    # 每天北京时间 08:00 运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # 番茄小说 (原生 HTTP，无需 Playwright)
      - name: Scrape Fanqie (番茄小说)
        run: node scrapers/fanqie.js
        continue-on-error: true

      # 起点中文网 (Playwright)
      - name: Scrape Qidian (起点中文网)
        run: node scrapers/qidian.js
        continue-on-error: true

      # 晋江文学城 (原生 HTTP)
      - name: Scrape JJWXC (晋江文学城)
        run: node scrapers/jjwxc.js
        continue-on-error: true

      # AI 智能分析
      - name: AI Analysis (通义千问)
        run: node scrapers/analyze.js
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        continue-on-error: true

      - name: Commit & Push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "📊 update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
